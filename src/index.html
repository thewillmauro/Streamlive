    <!-- Structured Data: FAQPage (drives rich results in Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I actually stream to all 5 platforms at the same time?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. One stream out, five platforms live simultaneously: Whatnot, TikTok Shop, Instagram Live, Amazon Live, and YouTube Live. Streamlive handles the multistream routing so you can focus on selling." }
        },
        {
          "@type": "Question",
          "name": "How does sale attribution work across live selling platforms?",
          "acceptedAnswer": { "@type": "Answer", "text": "Each order is matched to a buyer profile in your CRM using platform ID, email, and order timing. For YouTube, Streamlive uses a lightweight pixel on your Shopify store that ties sessions back to specific shows. Attribution accuracy sits at 99% across all five platforms." }
        },
        {
          "@type": "Question",
          "name": "What does the Live Command Center do?",
          "acceptedAnswer": { "@type": "Answer", "text": "The Live Command Center gives you one unified screen during your live show: real-time GMV across all platforms, buyer names as orders land, VIP alerts, and instant buyer lookup — replacing the need to watch 5 separate browser tabs." }
        },
        {
          "@type": "Question",
          "name": "Does Streamlive work with Shopify?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Streamlive connects directly to your Shopify store. Orders, products, and buyer history sync automatically. The Live Pixel installed on your Shopify store also enables cross-platform attribution for YouTube and other indirect sales." }
        },
        {
          "@type": "Question",
          "name": "How does the Host Briefing work?",
          "acceptedAnswer": { "@type": "Answer", "text": "The Briefing is a companion window you open on a second screen or tablet while you sell. It shows your current product, countdown timer, and AI-generated talking points that auto-advance with your run order so you always know what to say next." }
        },
        {
          "@type": "Question",
          "name": "What does it cost?",
          "acceptedAnswer": { "@type": "Answer", "text": "Free during beta. Paid plans start at $79/month when we launch. Beta users who join now lock in founding-member pricing." }
        },
        {
          "@type": "Question",
          "name": "Is my buyer data combined across platforms?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. When the same buyer shops on Whatnot and TikTok, Streamlive matches their profiles using email, phone, and behavioral signals. You get one buyer record with full cross-platform purchase history, not five separate lists." }
        },
        {
          "@type": "Question",
          "name": "What AI insights does Streamlive generate after each show?",
          "acceptedAnswer": { "@type": "Answer", "text": "Six AI recommendations scored by confidence and revenue impact — including which platform drove the most conversions, which products underperformed their AI rank, and which buyers are at risk of churning. Delivered as a report the moment you go offline." }
        }
      ]
    }
    </script>

    <!-- Intercom -->
    <script>
      (function(){
        var APP_ID = 'zyj40439';
        var w = window;
        var ic = w.Intercom;
        // Stub the queue so calls before the script loads are buffered
        if (typeof ic !== 'function') {
          var i = function(){ i.c(arguments); };
          i.q = []; i.c = function(a){ i.q.push(a); };
          w.Intercom = i;
        }
        // Inject the Intercom script
        var s = document.createElement('script');
        s.type = 'text/javascript'; s.async = true;
        s.src = 'https://widget.intercom.io/widget/' + APP_ID;
        // Explicitly call boot() once the script is ready
        s.onload = function() {
          w.Intercom('boot', {
            api_base: 'https://api-iam.intercom.io',
            app_id: APP_ID,
            background_color: '#7c3aed',
            action_color: '#7c3aed',
          });
          // Auto-greeting on first open
          var greeted = false;
          w.Intercom('onShow', function() {
            if (!greeted) {
              greeted = true;
              w.Intercom('showNewMessage', 'Hey! Thanks for checking out Streamlive. How can we help you today?');
            }
          });
        };
        var x = document.getElementsByTagName('script')[0];
        x.parentNode.insertBefore(s, x);
      })();
    </script>
