<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streamlive — Live Selling Command Center</title>
    <meta name="description" content="The all-in-one command center for live sellers. Multistream to Whatnot, TikTok, Instagram &amp; Amazon — with unified buyer CRM, attribution, post-show workflows, and analytics." />
    <meta name="theme-color" content="#06060e" />

    <!-- Open Graph (Facebook, iMessage, Slack, WhatsApp, LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.strmlive.com/" />
    <meta property="og:title"       content="Streamlive — Live Selling Command Center" />
    <meta property="og:description" content="The all-in-one command center for independent live sellers. Multistream to 5 platforms, track every sale, and manage buyers — all from one screen." />
    <meta property="og:image"       content="https://www.strmlive.com/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="Streamlive" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@strmlive" />
    <meta name="twitter:title"       content="Streamlive — Live Selling Command Center" />
    <meta name="twitter:description" content="The all-in-one command center for independent live sellers. Multistream to 5 platforms, track every sale, and manage buyers — all from one screen." />
    <meta name="twitter:image"       content="https://www.strmlive.com/og-image.png" />

    <!-- Favicon: SVG inline so no file needed -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c3aed'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-weight='900'>S</text></svg>" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; background: #06060e; }
    </style>

    <!-- Intercom -->
    <script>
      (function(){
        var APP_ID = 'zyj40439';
        var w = window;
        var ic = w.Intercom;
        // Stub the queue so calls before the script loads are buffered
        if (typeof ic !== 'function') {
          var i = function(){ i.c(arguments); };
          i.q = []; i.c = function(a){ i.q.push(a); };
          w.Intercom = i;
        }
        // Inject the Intercom script
        var s = document.createElement('script');
        s.type = 'text/javascript'; s.async = true;
        s.src = 'https://widget.intercom.io/widget/' + APP_ID;
        // Explicitly call boot() once the script is ready
        s.onload = function() {
          w.Intercom('boot', {
            api_base: 'https://api-iam.intercom.io',
            app_id: APP_ID,
            background_color: '#7c3aed',
            action_color: '#7c3aed',
          });
        };
        var x = document.getElementsByTagName('script')[0];
        x.parentNode.insertBefore(s, x);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
